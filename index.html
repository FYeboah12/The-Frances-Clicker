<!DOCTYPE html>

<head>
    <title>The Frances Clicker: Bushra and Frances</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Just+Me+Again+Down+Here&family=Sunshiney&display=swap');
    </style>
</head>

<body>
    <strong><u>
            <h1>Frances Clicker</h1>
        </u></strong>
    <div class="entire_display">
        <div class="clicker_display">
            <h2 class="cookie_count"> x Franceses </h2>
            <button class="frances_clicker">
                <img src="" alt="frances" id="frances" />
            </button>
            <p id="cps_display"> x Franceses per second </p>
            <p id="cpc_display"> X Franceses per click </p>
        </div>

        <div class="upgrades_display">
            <h2>What you already have:</h2>
            <ul id="upgrades_list">
            </ul>
        </div>

        <div class="purchasable_upgrades">
            <!-- each upgrades' price *= 1.25x per click -->
            <h2>✨Buy Upgrades✨</h2>
            <!-- click upgrades -->
            <div class="purchases">
                <button class="main_upgrade" id="stickers"> 10: hello kitty stickers 😸😸😸</button>
                <!-- increases frances per click-->

                <!-- over time upgrades -->
                <button class="main_upgrade" id="clones">25: frances clones 👯‍♀️👯‍♀️👯‍♀️</button>

                <div class="upgrade_pair">
                    <button class="main_upgrade" id="books">50: books 📖📖📖</button>
                    <button class="secondary_upgrade" id="rain"> 100: rainy day 🌧️🌧️🌧️</button>
                </div>

                <div class="upgrade_pair">
                    <button class="main_upgrade" id="icecream"> 1,000: ice cream 🍨🍨🍨</button>
                    <button class="secondary_upgrade" id="favcream"> 5,000: wafer cone 🍦🍦🍦</button>
                </div>

                <div class="upgrade_pair">
                    <button class="main_upgrade" id="netflix">10,000: netflix subscription with ads 📺📺📺</button>
                    <button class="secondary_upgrade" id="adblocker"> 50,000: adblocker ❎❎❎</button>
                </div>

                <div class="upgrade_pair">
                    <button class="main_upgrade" id="tickets">100,000: twice tickets 🎟️🎟️🎟️</button>
                    <button class="secondary_upgrade" id="lightstick">250,000: twice lightstick 🍭🍭🍭</button>
                </div>

                <div class="upgrade_pair">
                    <button class="main_upgrade" id="sleep"> 500,000: sleep 💤💤💤</button>
                    <button class="secondary_upgrade" id="schedule"> 10,000,000: sleep schedule 🛌🏾🛌🏾🛌🏾</button>
                </div>

                <button class="main_upgrade" id="jacket"> 100,000,000: pink zip-up 🧥🧥🧥</button>
            </div>
        </div>
    </div>

</body>
<script src="script.js"></script>

</html>
